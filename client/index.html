<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="description" content="Aurora — premium instruments, footwear, carry goods, and a curated space collection." />
    <title>Aurora — Modern Commerce</title>
    <script>
      // Prevent flash of incorrect theme: apply saved/system theme before paint.
      (function () {
        try {
          var t = localStorage.getItem('aurora-theme');
          var sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (t === 'dark' || (!t && sys)) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
